<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COBOL Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --card: #1a1a24; --border: #2a2a3a;
      --accent: #c8f135; --accent2: #7c6aff; --text: #e8e8f0; --muted: #6a6a8a; --danger: #ff5e5e;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 40px 20px;
      background-image: radial-gradient(ellipse 60% 40% at 80% 10%, rgba(124,106,255,0.12) 0%, transparent 60%), radial-gradient(ellipse 40% 30% at 10% 80%, rgba(200,241,53,0.07) 0%, transparent 50%); }
    .container { max-width: 820px; margin: 0 auto; }
    header { margin-bottom: 40px; animation: fadeUp 0.5s ease both; }
    .label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
    h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; letter-spacing: -1px; }
    h1 span { color: var(--accent); }
    .subtitle { margin-top: 10px; color: var(--muted); font-size: 14px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface); padding: 6px; border-radius: 12px; border: 1px solid var(--border); animation: fadeUp 0.5s ease 0.1s both; }
    .tab { flex: 1; padding: 12px 8px; background: transparent; border: none; border-radius: 8px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--card); color: var(--accent); border: 1px solid var(--border); }
    .panel { display: none; animation: fadeUp 0.4s ease both; }
    .panel.active { display: block; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 16px; }
    .card-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 22px; }
    #expense-list { display: flex; flex-direction: column; gap: 14px; }
    .expense-row { display: grid; grid-template-columns: 160px 120px 1fr auto; gap: 10px; align-items: end; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; animation: slideIn 0.3s ease both; }
    @keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
    input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; width: 100%; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(124,106,255,0.15); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
    .btn-remove { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); cursor: pointer; padding: 10px 13px; font-size: 15px; transition: all 0.2s; }
    .btn-remove:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,94,94,0.08); }
    .btn-add { margin-top: 14px; background: transparent; border: 1px dashed var(--border); border-radius: 10px; color: var(--muted); cursor: pointer; padding: 13px; width: 100%; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; transition: all 0.2s; }
    .btn-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,241,53,0.04); }
    .btn-primary { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 12px; color: #0a0a0f; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-primary:hover { background: #d9ff4a; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,241,53,0.2); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--accent2); border-radius: 12px; color: var(--accent2); font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { background: rgba(124,106,255,0.1); transform: translateY(-1px); }
    .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .output-box { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; white-space: pre-wrap; word-break: break-all; min-height: 80px; line-height: 1.7; }
    .total-display { text-align: center; padding: 32px 16px; }
    .total-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .total-value { font-family: 'Syne', sans-serif; font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; color: var(--accent); letter-spacing: -2px; }
    .error-box { display: none; margin-top: 14px; padding: 14px 16px; background: rgba(255,94,94,0.08); border: 1px solid rgba(255,94,94,0.3); border-radius: 10px; color: var(--danger); font-family: 'DM Mono', monospace; font-size: 12px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 999px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; }
    .badge-success { background: rgba(200,241,53,0.12); color: var(--accent); border: 1px solid rgba(200,241,53,0.3); }
    .badge-error { background: rgba(255,94,94,0.12); color: var(--danger); border: 1px solid rgba(255,94,94,0.3); }
    .badge-idle { background: rgba(106,106,138,0.15); color: var(--muted); border: 1px solid var(--border); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(200,241,53,0.3); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 7px; }
    .spinner-dark { border-color: rgba(10,10,15,0.3); border-top-color: #0a0a0f; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .status-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    @media (max-width: 580px) {
      .expense-row { grid-template-columns: 1fr 1fr; }
      .expense-row .field-group:nth-child(3) { grid-column: 1/-1; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <p class="label">// GnuCOBOL powered</p>
    <h1>COBOL <span>Expense</span> Tracker</h1>
    <p class="subtitle">frontend by claude ---- backend by Om Prakash </p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('add', this)">➕ Add Expenses</button>
    <button class="tab" onclick="switchTab('total', this)">💰 View Total</button>
    <button class="tab" onclick="switchTab('records', this)">📋 View Records</button>
  </div>

  <!-- TAB 1: ADD -->
  <div class="panel active" id="tab-add">
    <div class="card">
      <p class="card-title">// enter expense details</p>
      <div id="expense-list"></div>
      <button class="btn-add" onclick="addRow()">+ Add Another Row</button>
    </div>
    <div class="card" style="padding:20px;">
      <button class="btn-primary" id="btn-add-submit" onclick="submitExpenses()">Save Expenses via COBOL</button>
      <div class="error-box" id="add-error"></div>
    </div>
    <div class="card" id="add-result-card" style="display:none;">
      <div class="status-bar">
        <p class="card-title" style="margin:0;">// cobol output</p>
        <span class="badge badge-idle" id="add-badge">idle</span>
      </div>
      <div class="output-box" id="add-output">—</div>
    </div>
  </div>

  <!-- TAB 2: TOTAL -->
  <div class="panel" id="tab-total">
    <div class="card">
      <p class="card-title">// run view-total.exe</p>
      <button class="btn-secondary" id="btn-clear" onclick="clearExpenses()" style="margin-bottom:10px;border-color:var(--danger);color:var(--danger);">🗑 Clear All Expenses</button>
      <button class="btn-secondary" id="btn-total" onclick="fetchTotal()">Calculate Total Expenses</button>
      <div class="error-box" id="total-error"></div>
    </div>
    <div id="total-result-card" style="display:none;">
      <!-- Big total display -->
      <div style="background:linear-gradient(135deg,#1a1a24 0%,#13131a 100%);border:1px solid #2a2a3a;border-radius:20px;padding:40px 32px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden;">
        <div style="position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(200,241,53,0.08) 0%,transparent 70%);border-radius:50%;"></div>
        <div style="position:absolute;bottom:-30px;left:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(124,106,255,0.08) 0%,transparent 70%);border-radius:50%;"></div>
        <p style="font-family:DM Mono,monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#6a6a8a;margin-bottom:16px;">TOTAL EXPENSES</p>
        <p id="total-value" style="font-family:Syne,sans-serif;font-size:clamp(3rem,10vw,5.5rem);font-weight:800;color:#c8f135;letter-spacing:-3px;line-height:1;margin-bottom:16px;">—</p>
        <span class="badge badge-idle" id="total-badge" style="justify-content:center;">idle</span>
      </div>
      <!-- Terminal output -->
      <div style="background:#0d1117;border:1px solid #2a2a3a;border-radius:12px;overflow:hidden;">
        <div style="display:flex;align-items:center;gap:8px;padding:10px 16px;background:#161b22;border-bottom:1px solid #2a2a3a;">
          <span style="width:10px;height:10px;border-radius:50%;background:#ff5e5e;display:inline-block;"></span>
          <span style="width:10px;height:10px;border-radius:50%;background:#ffbd2e;display:inline-block;"></span>
          <span style="width:10px;height:10px;border-radius:50%;background:#27c93f;display:inline-block;"></span>
          <span style="font-family:DM Mono,monospace;font-size:10px;color:#6a6a8a;margin-left:8px;letter-spacing:1px;">view-total.exe — output</span>
        </div>
        <div style="padding:16px 20px;">
          <span style="color:#27c93f;font-family:DM Mono,monospace;font-size:12px;">$ </span>
          <span style="color:#6a6a8a;font-family:DM Mono,monospace;font-size:12px;">view-total.exe</span>
          <div id="total-output" style="font-family:DM Mono,monospace;font-size:13px;color:#c8f135;margin-top:8px;white-space:pre-wrap;line-height:1.8;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB 3: RECORDS -->
  <div class="panel" id="tab-records">
    <div class="card">
      <p class="card-title">// run view-records.exe</p>
      <button class="btn-secondary" id="btn-records" onclick="fetchRecords()">Load All Records</button>
      <div class="error-box" id="records-error"></div>
    </div>
    <div class="card" id="records-result-card" style="display:none;">
      <div class="status-bar">
        <p class="card-title" style="margin:0;">// cobol output</p>
        <span class="badge badge-idle" id="records-badge">idle</span>
      </div>
      <div class="output-box" id="records-output">—</div>
    </div>
  </div>
</div>

<script>
  let rowCount = 0;

  function switchTab(name, el) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    el.classList.add("active");
  }

  function addRow() {
    rowCount++;
    const id = rowCount;
    const row = document.createElement("div");
    row.className = "expense-row";
    row.id = `row-${id}`;
    row.innerHTML = `
      <div class="field-group"><label>Date</label><input type="date" id="date-${id}" required/></div>
      <div class="field-group"><label>Amount</label><input type="number" id="amount-${id}" placeholder="0" min="0" max="999999" required/></div>
      <div class="field-group"><label>Description</label><input type="text" id="desc-${id}" placeholder="e.g. Office supplies" maxlength="30" required/></div>
      <button class="btn-remove" onclick="removeRow(${id})">✕</button>
    `;
    document.getElementById("expense-list").appendChild(row);
  }

  function removeRow(id) { document.getElementById(`row-${id}`)?.remove(); }

  function collectExpenses() {
    const rows = document.querySelectorAll(".expense-row");
    const expenses = []; let valid = true;
    rows.forEach(row => {
      const id = row.id.replace("row-", "");
      const date = document.getElementById(`date-${id}`)?.value || "";
      const amount = document.getElementById(`amount-${id}`)?.value || "";
      const desc = document.getElementById(`desc-${id}`)?.value || "";
      if (!date || !amount || !desc) { valid = false; return; }
      expenses.push({ date, amount: parseInt(amount).toString(), description: desc });
    });
    return { expenses, valid, count: rows.length };
  }

  async function submitExpenses() {
    document.getElementById("add-error").style.display = "none";
    const { expenses, valid, count } = collectExpenses();
    if (count === 0) { showErr("add-error", "Add at least one expense row."); return; }
    if (!valid) { showErr("add-error", "Please fill in all fields for every row."); return; }
    const btn = document.getElementById("btn-add-submit");
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner spinner-dark"></span>Running COBOL...`;
    try {
      const res = await fetch("/api/add", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ expenses }) });
      const data = await res.json();
      if (!res.ok || data.error) { showErr("add-error", data.error); return; }
      document.getElementById("add-result-card").style.display = "block";
      document.getElementById("add-output").textContent = data.output || data.status || "(expenses saved)";
      setBadge("add-badge", true);
    } catch(e) { showErr("add-error", "Cannot reach Flask server. Is app.py running?"); }
    finally { btn.disabled = false; btn.innerHTML = "Save Expenses via COBOL"; }
  }

  async function fetchTotal() {
    document.getElementById("total-error").style.display = "none";
    const btn = document.getElementById("btn-total");
    btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>Running COBOL...`;
    try {
      const res = await fetch("/api/total");
      const data = await res.json();
      if (!res.ok || data.error) { showErr("total-error", data.error); return; }
      document.getElementById("total-result-card").style.display = "block";
      document.getElementById("total-output").textContent = data.output || "(no output)";
      const match = data.output.match(/\d+/);
      if (match) {
        // Format number with commas e.g. 1959 → 1,959
        const num = parseInt(match[0]);
        document.getElementById("total-value").textContent = num.toLocaleString();
      } else {
        document.getElementById("total-value").textContent = data.output;
      }
      setBadge("total-badge", true);
    } catch(e) { showErr("total-error", "Cannot reach Flask server. Is app.py running?"); }
    finally { btn.disabled = false; btn.innerHTML = "Calculate Total Expenses"; }
  }

  async function fetchRecords() {
    document.getElementById("records-error").style.display = "none";
    const btn = document.getElementById("btn-records");
    btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>Running COBOL...`;
    try {
      const res = await fetch("/api/records");
      const data = await res.json();
      if (!res.ok || data.error) { showErr("records-error", data.error); return; }
      document.getElementById("records-result-card").style.display = "block";
      document.getElementById("records-output").textContent = data.output || "(no records found)";
      setBadge("records-badge", true);
    } catch(e) { showErr("records-error", "Cannot reach Flask server. Is app.py running?"); }
    finally { btn.disabled = false; btn.innerHTML = "Load All Records"; }
  }

  function showErr(id, msg) { const el = document.getElementById(id); el.textContent = "⚠ " + msg; el.style.display = "block"; }
  function setBadge(id, ok) { const el = document.getElementById(id); el.className = "badge " + (ok ? "badge-success" : "badge-error"); el.textContent = ok ? "✓ done" : "⚠ error"; }

  addRow();
</script>
</body>
</html>
